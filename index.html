<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Models & tools</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; margin: 0; padding: 2rem; background: #f9f9f8; color: #1a1a1a; }
    .container { max-width: 800px; margin: 0 auto; }
    h1 { font-size: 22px; font-weight: 500; margin: 0 0 6px; }
    .subtitle { font-size: 15px; color: #666; margin: 0 0 2rem; }
    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 12px; }
    .card { background: #fff; border: 1px solid #e5e5e3; border-radius: 12px; padding: 1rem 1.25rem; text-decoration: none; display: block; transition: border-color 0.15s; }
    .card:hover { border-color: #b0b0ae; }
    .card-label { font-size: 11px; font-weight: 500; color: #999; text-transform: uppercase; letter-spacing: 0.05em; margin: 0 0 6px; }
    .card-title { font-size: 15px; font-weight: 500; color: #1a1a1a; margin: 0 0 4px; }
    .card-desc { font-size: 13px; color: #666; margin: 0; line-height: 1.5; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Models & tools</h1>
    <p class="subtitle">Interactive models built in Claude. Click any card to open.</p>
    <div class="grid">

      <!-- Copy and paste a card block below for each new model -->

      <a class="card" href="your-model.html">
        <p class="card-label">Model</p>
        <p class="card-title">Your model name</p>
        <p class="card-desc">Short description of what it does.</p>
      </a>

      <!-- Add more cards here -->

    </div>
  </div>
</body>
</html>
